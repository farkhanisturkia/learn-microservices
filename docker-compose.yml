version: '3.9'

services:
  lp-msroot:
      build:
        context: ./services/frontend/lp-msroot
        dockerfile: ../../../docker/Dockerfile.lp-msroot
      container_name: lp-msroot
      ports:
        - "${LP_MSROOT_EXPOSE_PORT}:80"
      networks:
        - microservices-network

  lp-msnews:
      build:
        context: ./services/frontend/lp-msnews
        dockerfile: ../../../docker/Dockerfile.lp-msnews
      container_name: lp-msnews
      ports:
        - "${LP_MSNEWS_EXPOSE_PORT}:80"
      networks:
        - microservices-network

networks:
  microservices-network:
    driver: bridge